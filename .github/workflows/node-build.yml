name: Node.js 自动构建

on: ["push"]

jobs: 
    build-and-check:
        runs-on: ubuntu-latest

        steps:
            - name: 拉取代码
              uses: actions/checkout@v4
            - name: 安装 Node.js 20
              uses: actions/setup-node@v4
              with: 
                registry-url: "https://registry.npmmirror.com"  # 淘宝镜像
                node-version: "20"
                cache: "pnpm"  
                
                # 新增：安装 pnpm 到全局（关键步骤）
            - name: 安装 pnpm
              run: |
                corepack enable  # 启用 Node 内置的 corepack 管理包管理器
                corepack prepare pnpm@latest --activate  # 安装最新版 pnpm
                echo "PATH=$PATH:$(pnpm bin -g)" >> $GITHUB_ENV

            - name: Install dependencies
              run: pnpm install

            - name: Build project
              run: pnpm run build

            - name: Deploy to Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                # 无需手动配置，GitHub 自动生成的临时 Token
                github_token: ${{ secrets.GITHUB_TOKEN }}
                # 前端打包后的目录（Vue/React/Vite 默认为 dist，CRA 为 build）
                publish_dir: ./dist
                # 可选：强制覆盖 gh-pages 分支，减少历史体积
                force_orphan: true
