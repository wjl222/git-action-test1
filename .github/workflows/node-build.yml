name: Node.js 自动构建

on: ["push"]

permissions:
  contents: write  # 允许写入/推送仓库内容（包括 gh-pages 分支）
  pages: write     # 允许操作 GitHub Pages
  id-token: write  # 辅助 Pages 部署权限

jobs: 
    build-and-check:
        runs-on: ubuntu-latest

        steps:
            - name: 拉取代码
              uses: actions/checkout@v4

            # 第一步：仅启用 corepack（不安装全局 pnpm，只为让 setup-node 识别 pnpm）
            - name: 启用 corepack
              run: corepack enable

            - name: 安装 Node.js 20
              uses: actions/setup-node@v4
              with: 
                registry-url: "https://registry.npmmirror.com"  # 淘宝镜像
                node-version: "20"
                cache: "pnpm"
                
                # 新增：安装 pnpm 到全局（关键步骤）
            - name: 安装 pnpm
              run: npm install pnpm -g

            - name: Install dependencies
              run: pnpm install

            - name: Build project
              run: pnpm run build

            - name: Deploy to Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                # 无需手动配置，GitHub 自动生成的临时 Token
                github_token: ${{ secrets.GITHUB_TOKEN }}
                # 前端打包后的目录（Vue/React/Vite 默认为 dist，CRA 为 build）
                publish_dir: ./dist
                # 可选：强制覆盖 gh-pages 分支，减少历史体积
                force_orphan: true
